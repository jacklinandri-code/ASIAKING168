<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{height:100%;font-family:'Inter',sans-serif;overflow:hidden;color:#fff;background:#050505}

/* BG */
.bg-grad{
  position:fixed;inset:0;z-index:1;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%,rgba(212,175,55,0.05) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 20% 80%,rgba(139,0,0,0.04) 0%,transparent 50%),
    radial-gradient(ellipse 60% 50% at 80% 80%,rgba(212,175,55,0.03) 0%,transparent 50%),
    #050505;
}
.bg-mesh{
  position:fixed;inset:0;z-index:2;opacity:0.3;
  background:
    radial-gradient(at 30% 30%,rgba(139,0,0,0.12) 0px,transparent 50%),
    radial-gradient(at 70% 70%,rgba(212,175,55,0.08) 0px,transparent 50%);
  animation:mesh 20s ease infinite;
}
@keyframes mesh{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}

.bg-noise{
  position:fixed;inset:0;z-index:2;opacity:0.02;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:150px;
}

canvas{position:fixed;inset:0;z-index:3;pointer-events:none}

/* Edges */
.edge{position:fixed;left:0;width:100%;height:1px;z-index:20}
.edge-t{top:0;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.12),transparent)}
.edge-b{bottom:0;background:linear-gradient(90deg,transparent,rgba(139,0,0,0.12),transparent)}

/* Corners */
.cr{position:fixed;width:32px;height:32px;z-index:20;opacity:0.12}
.cr::before,.cr::after{content:'';position:absolute;background:#D4AF37}
.cr-tl{top:14px;left:14px}.cr-tl::before{top:0;left:0;width:16px;height:1px}.cr-tl::after{top:0;left:0;width:1px;height:16px}
.cr-tr{top:14px;right:14px}.cr-tr::before{top:0;right:0;width:16px;height:1px}.cr-tr::after{top:0;right:0;width:1px;height:16px}
.cr-bl{bottom:14px;left:14px}.cr-bl::before{bottom:0;left:0;width:16px;height:1px}.cr-bl::after{bottom:0;left:0;width:1px;height:16px}
.cr-br{bottom:14px;right:14px}.cr-br::before{bottom:0;right:0;width:16px;height:1px}.cr-br::after{bottom:0;right:0;width:1px;height:16px}

/* === MAIN === */
.main{
  position:relative;z-index:10;height:100vh;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  gap:36px;
}

/* === LOGO === */
.logo-zone{
  position:relative;
  opacity:0;transform:scale(0.9) translateY(20px);
  animation:enter 1.2s 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
}

/* Hex wireframe behind logo */
.hex-frame{
  position:absolute;top:50%;left:50%;
  width:240px;height:240px;
  transform:translate(-50%,-50%);
  animation:hexSpin 30s linear infinite;
}
.hex-frame svg{width:100%;height:100%}

/* Glow */
.logo-aura{
  position:absolute;top:50%;left:50%;
  width:200px;height:200px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,0.1) 0%,rgba(139,0,0,0.04) 50%,transparent 70%);
  animation:aura 4s ease-in-out infinite;
}

/* Rings */
.lring{
  position:absolute;top:50%;left:50%;
  border-radius:50%;
  border:1px solid rgba(212,175,55,0.08);
  transform:translate(-50%,-50%);
}
.lring-1{width:195px;height:195px;animation:rbreath 5s ease-in-out infinite}
.lring-2{width:215px;height:215px;border-style:dashed;border-color:rgba(139,0,0,0.06);animation:rbreath 5s 1.5s ease-in-out infinite reverse}

/* The image */
.logo-img{
  position:relative;
  width:170px;height:auto;
  border-radius:18px;
  filter:drop-shadow(0 8px 40px rgba(139,0,0,0.4)) drop-shadow(0 0 20px rgba(212,175,55,0.15));
  animation:float 5s ease-in-out infinite;
}

@keyframes enter{to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes hexSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes aura{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes rbreath{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.3}50%{transform:translate(-50%,-50%) scale(1.05);opacity:.6}}

/* === LOADER === */
.loader-zone{
  display:flex;flex-direction:column;align-items:center;gap:18px;
  opacity:0;animation:fadeUp 0.8s 0.6s ease forwards;
}

.loader-ring-wrap{
  position:relative;width:80px;height:80px;
}

.lr{
  position:absolute;inset:0;
  border-radius:50%;
  border:2px solid transparent;
}
.lr-1{
  border-top-color:#D4AF37;border-right-color:rgba(212,175,55,0.15);
  animation:spin 1.6s cubic-bezier(0.6,0.15,0.35,0.85) infinite;
  filter:drop-shadow(0 0 6px rgba(212,175,55,0.35));
}
.lr-2{
  inset:6px;
  border-bottom-color:#8B0000;border-left-color:rgba(139,0,0,0.15);
  animation:spin 1.3s cubic-bezier(0.6,0.15,0.35,0.85) infinite reverse;
  filter:drop-shadow(0 0 5px rgba(139,0,0,0.3));
}
.lr-3{
  inset:12px;
  border-top-color:rgba(212,175,55,0.4);
  animation:spin 0.9s linear infinite;
}

.lr-pct{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;font-weight:600;
  background:linear-gradient(135deg,#F5DEB3,#D4AF37);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

@keyframes spin{to{transform:rotate(360deg)}}

/* Bar */
.bar-wrap{width:260px;max-width:72vw}
.bar-track{
  width:100%;height:2.5px;
  background:rgba(255,255,255,0.03);
  border-radius:999px;overflow:visible;position:relative;
}
.bar-track::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.05),transparent);
  animation:shim 2.5s infinite;
}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.bar-fill{
  height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,#8B0000,#D4AF37,#F5DEB3);
  background-size:300% 100%;
  animation:gshift 2s linear infinite;
  box-shadow:0 0 12px rgba(212,175,55,0.4),0 0 3px rgba(139,0,0,0.6);
  position:relative;transition:width 0.08s linear;
}
@keyframes gshift{0%{background-position:0% 50%}100%{background-position:300% 50%}}

.bar-fill::after{
  content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);
  width:7px;height:7px;border-radius:50%;
  background:#F5DEB3;
  box-shadow:0 0 8px #D4AF37,0 0 16px rgba(212,175,55,0.3);
}

/* Steps */
.steps{display:flex;justify-content:space-between;margin-top:4px}
.sp{display:flex;align-items:center;gap:5px;opacity:0.2;transition:opacity 0.5s ease}
.sp.on{opacity:1}
.sp-dot{
  width:4px;height:4px;border-radius:50%;
  background:#D4AF37;
  transition:box-shadow 0.5s ease;
}
.sp.on .sp-dot{box-shadow:0 0 6px rgba(212,175,55,0.7)}
.sp-txt{font-size:0.5rem;font-weight:500;letter-spacing:1.5px;color:rgba(255,255,255,0.25);text-transform:uppercase}
.sp.on .sp-txt{color:rgba(212,175,55,0.7)}

/* Dots */
.dots{display:flex;gap:6px;margin-top:2px}
.dots i{width:3.5px;height:3.5px;border-radius:50%;background:#D4AF37;animation:dpulse 1.6s ease infinite;font-style:normal}
.dots i:nth-child(2){animation-delay:.2s}
.dots i:nth-child(3){animation-delay:.4s}
@keyframes dpulse{0%,80%,100%{opacity:.15;transform:scale(.8)}40%{opacity:1;transform:scale(1.2);box-shadow:0 0 6px rgba(212,175,55,0.4)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media(max-width:480px){
  .logo-img{width:135px;border-radius:14px}
  .hex-frame{width:200px;height:200px}
  .logo-aura{width:170px;height:170px}
  .lring-1{width:165px;height:165px}
  .lring-2{width:182px;height:182px}
  .loader-ring-wrap{width:68px;height:68px}
  .lr-pct{font-size:0.75rem}
  .bar-wrap{width:220px}
  .sp-txt{font-size:0.4rem;letter-spacing:1px}
}
</style>
</head>

<body>

<div class="bg-grad"></div>
<div class="bg-mesh"></div>
<div class="bg-noise"></div>
<canvas id="ptc"></canvas>

<div class="edge edge-t"></div>
<div class="edge edge-b"></div>
<div class="cr cr-tl"></div>
<div class="cr cr-tr"></div>
<div class="cr cr-bl"></div>
<div class="cr cr-br"></div>

<div class="main">

  <!-- Logo Only -->
  <div class="logo-zone">
    <div class="hex-frame">
      <svg viewBox="0 0 200 200" fill="none">
        <polygon points="100,6 184,53 184,147 100,194 16,147 16,53" stroke="rgba(212,175,55,0.05)" stroke-width="0.6"/>
        <polygon points="100,26 166,63 166,137 100,174 34,137 34,63" stroke="rgba(139,0,0,0.04)" stroke-width="0.5"/>
        <polygon points="100,46 148,72 148,128 100,154 52,128 52,72" stroke="rgba(212,175,55,0.03)" stroke-width="0.4"/>
      </svg>
    </div>
    <div class="logo-aura"></div>
    <div class="lring lring-1"></div>
    <div class="lring lring-2"></div>
    <img src="https://ik.imagekit.io/Jawara88/ASIAKING168/GamePalingPopuler.jpg" class="logo-img" alt="Logo">
  </div>

  <!-- Loader -->
  <div class="loader-zone">
    <div class="loader-ring-wrap">
      <div class="lr lr-1"></div>
      <div class="lr lr-2"></div>
      <div class="lr lr-3"></div>
      <div class="lr-pct" id="pctTxt">0%</div>
    </div>

    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" id="barEl"></div>
      </div>
    </div>

    <div class="steps">
      <div class="sp on" id="s0"><div class="sp-dot"></div><span class="sp-txt">Verify</span></div>
      <div class="sp" id="s1"><div class="sp-dot"></div><span class="sp-txt">Connect</span></div>
      <div class="sp" id="s2"><div class="sp-dot"></div><span class="sp-txt">Secure</span></div>
      <div class="sp" id="s3"><div class="sp-dot"></div><span class="sp-txt">Launch</span></div>
    </div>

    <div class="dots"><i></i><i></i><i></i></div>
  </div>

</div>

<script>
/* Progress */
const pctTxt=document.getElementById('pctTxt'),barEl=document.getElementById('barEl');
const sp=[document.getElementById('s0'),document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3')];
let n=0;
function tick(){
  pctTxt.textContent=n+'%';
  barEl.style.width=n+'%';
  if(n>=5)sp[0].classList.add('on');
  if(n>=30)sp[1].classList.add('on');
  if(n>=60)sp[2].classList.add('on');
  if(n>=88)sp[3].classList.add('on');
  n++;
  if(n<=100){setTimeout(tick,n<50?22:n<80?35:n<95?50:60)}
  else{setTimeout(go,500)}
}
function go(){
  const d=["https://www.jwr88bahlil.biz//register?ref=ZABABAW00EJK","https://asiaking168n.xyz/","https://jawara88gbrn.site/register?ref=ZABABAW00EJK"];
  document.body.style.transition='opacity .8s ease';
  document.body.style.opacity='0';
  setTimeout(()=>{location.href=d[Math.floor(Math.random()*d.length)]},800);
}
setTimeout(tick,1200);

/* Particles */
const c=document.getElementById('ptc'),x=c.getContext('2d');
let W,H;const ps=[],N=55,CD=120;
function rz(){W=c.width=innerWidth;H=c.height=innerHeight}
addEventListener('resize',rz);rz();

class P{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.r=Math.random()*1.2+0.3;
    this.vx=(Math.random()-0.5)*0.25;
    this.vy=(Math.random()-0.5)*0.25;
    this.a=Math.random()*0.35+0.05;
    this.da=(Math.random()-0.5)*0.003;
    const cs=['#D4AF37','#F5DEB3','#8B0000','#B8860B'];
    this.c=cs[Math.floor(Math.random()*cs.length)];
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.a+=this.da;
    if(this.a>0.45||this.a<0.03)this.da*=-1;
    if(this.x<-20)this.x=W+20;if(this.x>W+20)this.x=-20;
    if(this.y<-20)this.y=H+20;if(this.y>H+20)this.y=-20;
  }
  draw(){
    x.globalAlpha=this.a;x.fillStyle=this.c;
    x.beginPath();x.arc(this.x,this.y,this.r,0,Math.PI*2);x.fill();
    x.globalAlpha=this.a*0.12;
    x.beginPath();x.arc(this.x,this.y,this.r*4,0,Math.PI*2);x.fill();
  }
}
for(let i=0;i<N;i++)ps.push(new P());

function loop(){
  x.clearRect(0,0,W,H);
  for(let i=0;i<ps.length;i++){
    for(let j=i+1;j<ps.length;j++){
      const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=dx*dx+dy*dy;
      if(d<CD*CD){
        x.globalAlpha=(1-Math.sqrt(d)/CD)*0.05;
        x.strokeStyle='#D4AF37';x.lineWidth=0.4;
        x.beginPath();x.moveTo(ps[i].x,ps[i].y);x.lineTo(ps[j].x,ps[j].y);x.stroke();
      }
    }
  }
  ps.forEach(p=>{p.update();p.draw()});
  x.globalAlpha=1;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
